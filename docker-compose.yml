# Kids LMS — Hạ tầng local cho Phase 1
# Khởi động: docker compose up -d
# Dừng:      docker compose down   (thêm -v để xoá luôn dữ liệu)

services:
  postgres:
    image: postgres:18
    container_name: kids-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: QuangMinh@2018
      POSTGRES_DB: kids_lms
    ports:
      - "5432:5432"
    volumes:
      # PG18+: mount thư mục cha; data nằm trong subdir theo version (vd /var/lib/postgresql/18/docker)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kids_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kids-lms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
