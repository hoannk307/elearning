# Kids LMS — Hạ tầng local cho Phase 1
# Khởi động: docker compose up -d
# Dừng:      docker compose down   (thêm -v để xoá luôn dữ liệu)

services:
  postgres:
    image: postgres:18
    container_name: kids-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: QuangMinh@2018
      POSTGRES_DB: kids_lms
      # PG18+: đặt data vào subdir để entrypoint tự tạo + chown đúng quyền (tránh lỗi Permission denied).
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kids_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kids-lms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
