# Kids LMS — Stack production cho VPS
# Khởi động: docker compose -f docker-compose.prod.yml up -d --build
# Biến môi trường đọc từ file .env cùng thư mục (KHÔNG commit file này).

services:
  postgres:
    image: postgres:16-alpine
    container_name: kids-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgresPassword}
      POSTGRES_DB: ${POSTGRES_DB:-kids_lms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kids_lms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Không publish ra Internet — chỉ dùng trong mạng nội bộ Docker.

  redis:
    image: redis:7-alpine
    container_name: kids-lms-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Không publish port 6379 — chỉ truy cập nội bộ.

  backend:
    image: ghcr.io/hoannk307/elearning-backend:${IMAGE_TAG:-latest}
    container_name: kids-lms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # DATABASE_URL trỏ tới service postgres trong mạng Docker.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgresPassword}@postgres:5432/${POSTGRES_DB:-kids_lms}?schema=public
      FRONTEND_URL: ${FRONTEND_URL}
      # --- Secret bơm từ GitHub Actions lúc deploy (KHÔNG lưu file .env trên VPS) ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-claude-sonnet-4-6}
      APP_PIN: ${APP_PIN:-1234}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    # Không publish — Caddy proxy nội bộ tới backend:3004.

  frontend:
    image: ghcr.io/hoannk307/elearning-frontend:${IMAGE_TAG:-latest}
    container_name: kids-lms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    # Không publish — Caddy proxy nội bộ tới frontend:3005.

  caddy:
    image: caddy:2-alpine
    container_name: kids-lms-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      # 80/443 đã thuộc stack batdongsan, nên app này chạy ở cổng 8080 (HTTP).
      # Truy cập: http://elearning.nhatranglands.vn:8080
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
