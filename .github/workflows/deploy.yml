name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # cho phép bấm chạy thủ công

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/elearning-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/elearning-frontend

jobs:
  # ---- Build image trên CI rồi push lên GHCR ----
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            BACKEND_INTERNAL_URL=http://backend:3004
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- VPS chỉ kéo image mới về và chạy (KHÔNG build) ----
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose & Caddyfile lên VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 103.101.162.52
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml,Caddyfile"
          target: /opt/elearning

      - name: Pull image & up stack trên VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: 103.101.162.52
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/elearning
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
