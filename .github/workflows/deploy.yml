name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {} # cho phép bấm chạy thủ công

jobs:
  # ---- Kiểm tra build trước khi deploy ----
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ---- SSH vào VPS, pull code, build & up lại stack ----
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Debug key fingerprint
        run: |
          install -m 600 /dev/null /tmp/k
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > /tmp/k
          ssh-keygen -lf /tmp/k || echo "KEY KHONG PARSE DUOC"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 103.101.162.52
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/elearning
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
